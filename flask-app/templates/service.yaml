apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-flask-service
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-flask-app
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Release.Name }}-flask-app
  ports:
  - protocol: TCP
    port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
    name: http
